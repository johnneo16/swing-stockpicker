name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # Pinned to the production runtime in scripts/com.swingpro.server.plist
          # and the Docker image base. Bump deliberately, not opportunistically.
          node-version: '20.19.2'

      # build-essential lets better-sqlite3's node-gyp step compile cleanly.
      # node:20 on ubuntu-latest already ships gcc, but pin it explicitly so a
      # base-image change doesn't suddenly break the build.
      - name: Install build tools (better-sqlite3 native compile)
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      # Note: package-lock.json is gitignored in this repo (an existing
      # project decision). Without it `npm ci` won't work — fall back to
      # `npm install` for now. Switch to `npm ci` once a lock file is
      # committed.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test
        env:
          # Tests force SWINGPRO_DB=:memory: via tests/setup.js, but set
          # NODE_ENV=test here too so the production logger path is skipped
          # before Vitest's setup file runs.
          NODE_ENV: test

  build:
    name: Vite build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20.19.2'
      - run: npm install --no-audit --no-fund
      - run: npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: swingpro:ci
          # Single-arch (amd64) for CI smoke-build. Multi-arch belongs in a
          # separate release workflow when we actually publish.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
